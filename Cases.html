<!DOCTYPE html>
<html>

<head>
<title>Cases</title>
</head>

<body>

<h2>Registered Cases</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Status</th>
</tr>

{% for c in cases %}

<tr>

<td>{{c.id}}</td>

<td>{{c.first_name}} {{c.last_name}}</td>

<td>{{c.email}}</td>

<td>

{% if c.is_found %}
Found
{% else %}
Missing
{% endif %}

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Back</a>

</body>

</html>
